# Portage options ----------------------------------------------

FEATURES="buildpkg parallel-fetch parallel-install"
EMERGE_DEFAULT_OPTS="-tgv -j3 --keep-going"

GENTOO_MIRRORS="https://ftp.jaist.ac.jp/pub/Linux/Gentoo/ https://distfiles.gentoo.org"
FETCHCOMMAND="${FETCHCOMMAND} -t3 -T3"
RESUMECOMMAND="${RESUMECOMMAND} -t3 -T3"

PORTAGE_WORKDIR_MODE=0770

# Compiler options ---------------------------------------------

CPU=znver2

CFLAGS="-march=$CPU -O2 -pipe"
CXXFLAGS="${CFLAGS}"
FCFLAGS="${CFLAGS}"
FFLAGS="${CFLAGS}"

RUSTFLAGS="-Copt-level=2 -Ctarget-cpu=$CPU"

# Packages options ---------------------------------------------

ACCEPT_LICENSE="* -@EULA"

CPU_FLAGS_X86="aes avx avx2 bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 sse4a ssse3"
